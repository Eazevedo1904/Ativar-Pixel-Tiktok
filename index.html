<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Pixel Tracker - Black Edition</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e0e0e0;
        }
        
        .container {
            background: #1a1f3a;
            border: 1px solid #2a2f4a;
            border-radius: 12px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        
        h1 {
            color: #fff;
            margin-bottom: 5px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .setup-section {
            background: #151a2f;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 35px;
            border: 1px solid #252a3f;
        }
        
        .setup-section.hidden {
            display: none;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 12px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            font-size: 14px;
            border: 1px solid #2a2f4a;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            background: #0a0e27;
            color: #fff;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }
        
        .helper-text {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            font-style: italic;
        }
        
        .btn-activate {
            width: 100%;
            padding: 16px 30px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid #d4af37;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: transparent;
            color: #d4af37;
            margin-top: 20px;
        }
        
        .btn-activate:hover:not(:disabled) {
            background: #d4af37;
            color: #0a0e27;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        
        .btn-activate:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 18px;
            padding: 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            border-left: 3px solid;
        }
        
        .status.success {
            display: block;
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
            border-left-color: #34d399;
        }
        
        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-left-color: #ef4444;
        }
        
        .events-section {
            display: none;
        }
        
        .events-section.active {
            display: block;
        }
        
        .current-pixel {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid #d4af37;
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #d4af37;
        }
        
        .current-pixel strong {
            font-family: 'Monaco', 'Menlo', monospace;
            font-weight: 700;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .event-btn {
            padding: 18px 16px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid #2a2f4a;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: transparent;
            color: #e0e0e0;
        }
        
        .event-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
        }
        
        .event-btn.active {
            background: #d4af37;
            color: #0a0e27;
            border-color: #d4af37;
        }
        
        .btn-all {
            width: 100%;
            padding: 16px 30px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid #d4af37;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: #d4af37;
            color: #0a0e27;
            margin-bottom: 25px;
        }
        
        .btn-all:hover {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }
        
        .log {
            background: #0a0e27;
            border: 1px solid #2a2f4a;
            border-radius: 10px;
            padding: 20px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .log-title {
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 12px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .log-entry {
            padding: 10px;
            margin-bottom: 8px;
            background: #151a2f;
            border-radius: 6px;
            font-size: 12px;
            color: #aaa;
            border-left: 3px solid #d4af37;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .log-entry strong {
            color: #d4af37;
        }
        
        .timestamp {
            color: #555;
            font-size: 10px;
            margin-top: 4px;
        }
        
        /* Scrollbar customizada */
        .log::-webkit-scrollbar {
            width: 6px;
        }
        
        .log::-webkit-scrollbar-track {
            background: #151a2f;
            border-radius: 10px;
        }
        
        .log::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }
        
        .log::-webkit-scrollbar-thumb:hover {
            background: #e5c158;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .events-grid {
                grid-template-columns: 1fr;
            }
            
            .event-btn {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 PIXEL TRACKER</h1>
        <div class="subtitle">TikTok Ads Manager</div>
        
        <!-- Seção de Configuração -->
        <div class="setup-section" id="setupSection">
            <label for="pixelId">Pixel ID:</label>
            <input 
                type="text" 
                id="pixelId" 
                placeholder="Ex: D7J7MABC77U8DEPHINI0"
                maxlength="20"
            >
            <div class="helper-text">TikTok Ads Manager > Assets > Event</div>
            <button class="btn-activate" onclick="activatePixel()">
                Ativar Pixel
            </button>
            <div class="status" id="statusMessage"></div>
        </div>
        
        <!-- Seção de Eventos -->
        <div class="events-section" id="eventsSection">
            <div class="current-pixel" id="currentPixelInfo"></div>
            
            <button class="btn-all" onclick="fireAllEvents()">
                ⚡ Disparar Todos os Eventos
            </button>
            
            <div class="events-grid">
                <button class="event-btn" onclick="firePageView()" title="PageView">
                    👁️ Page View
                </button>
                
                <button class="event-btn" onclick="fireViewContent()" title="ViewContent">
                    🔍 View Content
                </button>
                
                <button class="event-btn" onclick="fireClickButton()" title="ClickButton">
                    🖱️ Click Button
                </button>
                
                <button class="event-btn" onclick="fireInitiateCheckout()" title="InitiateCheckout">
                    🛒 Initiate Checkout
                </button>
                
                <button class="event-btn" onclick="firePurchase()" title="Purchase">
                    💳 Purchase
                </button>
            </div>
            
            <div class="log">
                <div class="log-title">📋 Event Log</div>
                <div id="logContainer"></div>
            </div>
        </div>
    </div>
    
    <script>
        let pixelLoaded = false;
        let currentPixelId = null;
        let eventQueue = [];
        
        function addLog(eventName, details = '') {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const timestamp = new Date().toLocaleTimeString('pt-BR');
            
            entry.innerHTML = `
                <strong>${eventName}</strong> ${details}
                <div class="timestamp">${timestamp}</div>
            `;
            
            logContainer.insertBefore(entry, logContainer.firstChild);
            
            // Limitar a 50 entradas no log
            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }
        
        function showStatus(message, isSuccess) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status ' + (isSuccess ? 'success' : 'error');
        }
        
        function activatePixel() {
            const pixelId = document.getElementById('pixelId').value.trim();
            
            if (!pixelId) {
                showStatus('❌ Insira um Pixel ID válido', false);
                return;
            }
            
            if (pixelId.length < 10) {
                showStatus('❌ ID do Pixel inválido. Verifique.', false);
                return;
            }
            
            currentPixelId = pixelId;
            loadTikTokPixel(pixelId);
        }
        
        function loadTikTokPixel(pixelId) {
            // Script otimizado do TikTok Pixel
            const script = document.createElement('script');
            script.innerHTML = `
                !function (w, d, t) {
                  w.TiktokAnalyticsObject=t;
                  var ttq=w[t]=w[t]||[];
                  ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"];
                  ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};
                  for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);
                  ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e};
                  ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{};ttq._i[e]=[];ttq._i[e]._u=i;ttq._t=ttq._t||{};ttq._t[e]=+new Date;ttq._o=ttq._o||{};ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript";o.async=!0;o.src=i+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};
                  ttq.load('${pixelId}');
                  ttq.page();
                }(window, document, 'ttq');
            `;
            
            document.head.appendChild(script);
            
            setTimeout(() => {
                if (typeof ttq !== 'undefined') {
                    pixelLoaded = true;
                    showStatus('✅ Pixel ativado com sucesso', true);
                    
                    document.getElementById('setupSection').classList.add('hidden');
                    document.getElementById('eventsSection').classList.add('active');
                    document.getElementById('currentPixelInfo').innerHTML = 
                        `📍 PIXEL ATIVO: <strong>${pixelId}</strong>`;
                    
                    addLog('PIXEL_LOADED', `ID: ${pixelId}`);
                    console.log('✅ TikTok Pixel loaded:', pixelId);
                } else {
                    showStatus('❌ Erro ao carregar pixel. Verifique o ID.', false);
                }
            }, 800);
        }
        
        // Eventos otimizados com dados realistas
        
        function firePageView() {
            if (!pixelLoaded) return alertPixel();
            ttq.page();
            addLog('PAGE_VIEW', 'Página carregada');
        }
        
        function fireViewContent() {
            if (!pixelLoaded) return alertPixel();
            ttq.track('ViewContent', {
                content_id: ['PROD-' + Math.random().toString(36).substr(2, 9)],
                content_name: 'Produto Premium',
                content_type: 'product',
                value: 199.90,
                currency: 'BRL'
            });
            addLog('VIEW_CONTENT', 'R$ 199.90');
        }
        
        function fireClickButton() {
            if (!pixelLoaded) return alertPixel();
            ttq.track('ClickButton', {
                button_id: 'cta-' + Date.now(),
                button_text: 'Comprar Agora'
            });
            addLog('CLICK_BUTTON', 'CTA clicado');
        }
        
        function fireInitiateCheckout() {
            if (!pixelLoaded) return alertPixel();
            ttq.track('InitiateCheckout', {
                content_id: ['PROD-' + Math.random().toString(36).substr(2, 9)],
                content_name: 'Produto Premium',
                content_type: 'product',
                quantity: 1,
                value: 199.90,
                currency: 'BRL'
            });
            addLog('INITIATE_CHECKOUT', 'R$ 199.90 - 1 item');
        }
        
        function firePurchase() {
            if (!pixelLoaded) return alertPixel();
            ttq.track('Purchase', {
                content_id: ['PROD-' + Math.random().toString(36).substr(2, 9)],
                content_name: 'Produto Premium',
                content_type: 'product',
                quantity: 1,
                value: 199.90,
                currency: 'BRL'
            });
            addLog('PURCHASE', 'Compra realizada - R$ 199.90');
        }
        
        function fireAllEvents() {
            if (!pixelLoaded) return alertPixel();
            
            const events = [
                { fn: firePageView, delay: 0 },
                { fn: fireViewContent, delay: 200 },
                { fn: fireClickButton, delay: 400 },
                { fn: fireInitiateCheckout, delay: 600 },
                { fn: firePurchase, delay: 800 }
            ];
            
            events.forEach(event => {
                setTimeout(event.fn, event.delay);
            });
            
            addLog('ALL_EVENTS', 'Sequência de 5 eventos disparada');
        }
        
        function alertPixel() {
            showStatus('❌ Ative o pixel primeiro', false);
        }
        
        // Enter key para ativar
        document.getElementById('pixelId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                activatePixel();
            }
        });
    </script>
</body>
</html>
